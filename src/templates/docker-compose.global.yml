services:
  traefik:
    image: traefik:v3
    container_name: 42wp_traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - 42wp_network

  db:
    image: mysql:9.7
    container_name: 42wp_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./mysql-data:/var/lib/mysql
    networks:
      - 42wp_network
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: 42wp_phpmyadmin
    environment:
      PMA_HOST: db
      UPLOAD_LIMIT: 300M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pma.rule=Host(`db.42wp.localhost`)"
      - "traefik.http.services.pma.loadbalancer.server.port=80"
    networks:
      - 42wp_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: 42wp_mailpit
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mail.rule=Host(`mail.42wp.localhost`)"
      - "traefik.http.services.mail.loadbalancer.server.port=8025"
    networks:
      - 42wp_network

networks:
  42wp_network:
    external: false
    name: 42wp_network
